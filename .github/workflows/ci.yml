name: RAG Engine CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'rag-engine/**'
  pull_request:
    branches: [main]
    paths:
      - 'rag-engine/**'

jobs:
  # ── BACKEND TESTS ──────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-engine/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run backend tests
        run: pytest tests/ -v --tb=short
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VECTOR_DB: chroma
          DATABASE_URL: sqlite+aiosqlite:///./test.db

  # ── FRONTEND BUILD ─────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-engine/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: rag-engine/frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: rag-engine/frontend/dist

  # ── DOCKER BUILD & PUSH ────────────────────────────────────────────
  docker:
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./rag-engine/backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rag-engine-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./rag-engine/frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rag-engine-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
